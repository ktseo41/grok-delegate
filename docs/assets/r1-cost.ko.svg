<text x="20" y="48" font-size="10.5" fill="#898781" text-anchor="start" font-weight="normal" font-family="system-ui,-apple-system,Segoe UI,sans-serif">API 정가 환산(대체비용): Claude는 run.json · deepseek는 OpenRouter 실비 · grok은 자체 토큰 로그를 grok-4.5 단가로 환산.</text>
<text x="20" y="63" font-size="10.5" fill="#898781" text-anchor="start" font-weight="normal" font-family="system-ui,-apple-system,Segoe UI,sans-serif">실제 지출은 다름 — 둘 다 구독(grok SuperGrok 월 $30, Claude Max x20 월 $200)이라 실행당 한계비용 ≈ $0; 이 막대는 API 정가 환산값.</text>
<text x="210" y="131" font-size="12" fill="#0b0b0b" text-anchor="end" font-weight="600" font-family="system-ui,-apple-system,Segoe UI,sans-serif">fable + grok 워커</text>
