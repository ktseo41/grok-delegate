<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 412" width="1050" height="412" role="img" aria-label="라운드 1 조합별 잠재 비용">
<rect width="1050" height="412" rx="8" fill="#fcfcfb"/>
