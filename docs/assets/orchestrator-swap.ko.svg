<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 254" width="1050" height="254" role="img" aria-label="오케스트레이터 교체 — 조합별 손실 셀과 비용">
<rect width="1050" height="254" rx="8" fill="#fcfcfb"/>
<text x="20" y="30" font-size="15" fill="#0b0b0b" text-anchor="start" font-weight="600" font-family="system-ui,-apple-system,Segoe UI,sans-serif">오케스트레이터 교체 — 같은 grok 워커, 오케스트레이터 모델만 변경 (라운드2 과제, 2026-07-12)</text>
<text x="20" y="48" font-size="10.5" fill="#898781" text-anchor="start" font-weight="normal" font-family="system-ui,-apple-system,Segoe UI,sans-serif">라운드2 과제·워커·분할/조립 규칙 동일 — 오케스트레이터 모델만 변경.</text>
<text x="20" y="63" font-size="10.5" fill="#898781" text-anchor="start" font-weight="normal" font-family="system-ui,-apple-system,Segoe UI,sans-serif">비용은 API 환산; grok 구간은 외부 미터(C가 높음 — 재시도 6워커); opus 단독 막대는 전부 Claude(opus + 내부 haiku 웹).</text>
